version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: lojaveloz
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  inventory-service:
    build:
      context: ./inventory-service
    ports:
      - "3333:3000"
    environment:
      - DB_HOST=postgres-db
      - RABBITMQ_URL=amqp://rabbitmq
    depends_on:
      - postgres-db
      - rabbitmq

volumes:
  pgdata: